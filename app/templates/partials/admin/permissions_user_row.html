<!-- app/templates/partials/admin/permissions_user_row.html -->
<div class="user-row"
     id="user-row-{{ user_row.user_id }}"
     style="display: grid; grid-template-columns: minmax(180px, 1fr) auto; gap: 16px; align-items: center; padding: 16px; border-bottom: 1px solid var(--border);"
     x-show="search === '' || '{{ user_row.email | lower }}'.includes(search.toLowerCase())">

  <span style="font-size: 0.95rem; font-weight: 500; word-break: break-all;">{{ user_row.email }}</span>

  <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end;">
    {% for feature in features %}
      {% set is_granted = feature in user_row.features %}
      <form hx-post="/admin/permissions/{{ 'revoke' if is_granted else 'grant' }}"
            hx-target="#user-row-{{ user_row.user_id }}"
            hx-swap="outerHTML"
            style="margin: 0; display: block;">
        <input type="hidden" name="user_id" value="{{ user_row.user_id }}">
        <input type="hidden" name="feature" value="{{ feature }}">
        
        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; padding: 6px 12px; border-radius: 6px; background: {% if is_granted %}var(--bg-card){% else %}transparent{% endif %}; border: 1px solid {% if is_granted %}var(--accent){% else %}var(--border){% endif %}; transition: all 0.2s; white-space: nowrap;">
          <input type="checkbox"
                 onchange="this.form.requestSubmit()"
                 {% if is_granted %}checked{% endif %}
                 style="accent-color: var(--accent); margin: 0; width: 14px; height: 14px; cursor: pointer;">
          <span style="color: {% if is_granted %}var(--text){% else %}var(--text-muted){% endif %}; user-select: none;">{{ feature }}</span>
        </label>
      </form>
    {% endfor %}
  </div>
</div>
