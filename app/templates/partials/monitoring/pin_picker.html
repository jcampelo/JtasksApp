<!-- app/templates/partials/monitoring/pin_picker.html -->
<div class="modal-backdrop show" id="modal-backdrop"
     x-data="{ search: '' }"
     onclick="if(event.target===this)document.getElementById('modal-container').innerHTML=''"
     @keydown.escape.window="document.getElementById('modal-container').innerHTML = ''">
  
  <div class="modal">
    <div class="modal-header">
      <h2>Pinar usuários</h2>
      <button class="btn-close" onclick="document.getElementById('modal-container').innerHTML=''">×</button>
    </div>

    <!-- Busca client-side -->
    <div class="field" style="margin-bottom: 16px;">
      <input type="text" x-model="search" placeholder="Buscar por email..." autofocus style="width: 100%; border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; background: rgba(0,0,0,0.2); color: var(--text);" />
    </div>

    <!-- Lista de usuários -->
    <div class="preset-list" id="pin-picker-list" style="max-height: 50vh; overflow-y: auto;">
      {% include "partials/monitoring/pin_picker_list.html" %}
    </div>
  </div>
</div>
