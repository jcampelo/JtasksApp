<!-- Toggle mobile para form -->
<button class="mobile-add-toggle" id="mobile-add-toggle" onclick="document.querySelector('.add-form').classList.toggle('mobile-open'); this.classList.toggle('active')">
  <span class="mobile-add-toggle-icon">+</span>
  <span class="mobile-add-toggle-label">Nova tarefa</span>
</button>

<!-- Formulário adicionar tarefa -->
<div class="add-form">
  <form id="add-task-form"
        hx-post="/tasks"
        hx-target="#panel-ativas"
        hx-swap="innerHTML"
        hx-disabled-elt="find button[type='submit']"
        hx-on::before-request="this.querySelector('button[type=submit]').textContent='Adicionando...'"
        hx-on::after-request="this.querySelector('button[type=submit]').textContent='+ Adicionar'; if(event.detail.successful) this.reset()">
    <div class="field full">
      <label>Atividade</label>
      <textarea name="name" placeholder="Descreva a atividade..." maxlength="120" required
                onkeydown="if(event.ctrlKey&&event.key==='Enter'){event.preventDefault();this.closest('form').requestSubmit();}"></textarea>
      <span class="error-msg" id="err-name"></span>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Projeto</label>
        <select name="project" id="task-project-select" required>
          <option value="" disabled selected>— Selecione —</option>
          {% for proj in projects %}
          <option value="{{ proj.name }}">{{ proj.name }}</option>
          {% endfor %}
        </select>
        <span class="error-msg" id="err-project"></span>
      </div>
      <div class="field field-priority">
        <label>Prioridade</label>
        <select name="priority">
          <option value="normal">⚪ Normal</option>
          <option value="urgente">🟡 Urgente</option>
          <option value="critica">🔴 Crítica</option>
        </select>
      </div>
      <div class="field">
        <label>Prazo</label>
        <input name="deadline" type="date" id="task-deadline" />
        <span class="error-msg" id="err-deadline"></span>
      </div>
      <button type="submit" class="btn-add">+ Adicionar</button>
    </div>
  </form>
</div>

<!-- Barra de filtros -->
<div class="filter-toolbar" x-data="filterBar()" :class="{ 'filter-loading': loading }">
  <!-- Busca -->
  <div class="filter-search">
    <svg class="filter-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Buscar tarefa..."
           x-model="search"
           :disabled="loading"
           @input.debounce.300ms="applyFilters()" />
  </div>

  <!-- Projeto -->
  <select class="filter-select" x-model="project" :disabled="loading" @change="applyFilters()">
    <option value="">Todos os projetos</option>
    {% for proj in projects %}
    <option value="{{ proj.name }}">{{ proj.name }}</option>
    {% endfor %}
  </select>

  <!-- Pills de prioridade -->
  <div class="filter-pills">
    <button class="filter-pill" :class="{ active: priority === '' }" :disabled="loading" @click="setPriority('')">Todas</button>
    <button class="filter-pill" :class="{ active: priority === 'critica' }" :disabled="loading" @click="setPriority('critica')">Critica</button>
    <button class="filter-pill" :class="{ active: priority === 'urgente' }" :disabled="loading" @click="setPriority('urgente')">Urgente</button>
    <button class="filter-pill" :class="{ active: priority === 'normal' }" :disabled="loading" @click="setPriority('normal')">Normal</button>
  </div>

  <!-- Toggle Atrasadas -->
  <button class="filter-pill filter-pill-overdue" :class="{ active: overdue }" :disabled="loading" @click="toggleOverdue()">Atrasadas</button>

  <!-- Ordenar -->
  <select class="filter-select" x-model="sort" :disabled="loading" @change="applyFilters()">
    <option value="priority">Prioridade</option>
    <option value="deadline_asc">Prazo</option>
    <option value="created_desc">Mais recentes</option>
    <option value="created_asc">Mais antigas</option>
  </select>

  <!-- Spinner de loading -->
  <span class="filter-spinner" x-show="loading"></span>

  <!-- Limpar filtros -->
  <button class="filter-clear" x-show="hasFilters() && !loading" @click="clearFilters()">Limpar</button>
</div>

<!-- Lista de tarefas -->
<div id="task-list-body">
  {% set sort = "priority" %}
  {% include "partials/tasks/task_list_body.html" %}
</div>

<script>
function filterBar() {
  return {
    search: '',
    project: '',
    priority: '',
    sort: 'priority',
    overdue: false,
    loading: false,

    applyFilters() {
      var self = this;
      self.loading = true;
      var params = new URLSearchParams();
      if (this.search)   params.set('search', this.search);
      if (this.project)  params.set('project', this.project);
      if (this.priority) params.set('priority', this.priority);
      if (this.sort !== 'priority') params.set('sort', this.sort);
      if (this.overdue)  params.set('overdue', 'true');
      htmx.ajax('GET', '/tasks/filter?' + params.toString(), {
        target: '#task-list-body',
        swap: 'innerHTML'
      }).then(function() {
        self.loading = false;
      }).catch(function() {
        self.loading = false;
      });
    },

    setPriority(val) {
      this.priority = val;
      this.applyFilters();
    },

    toggleOverdue() {
      this.overdue = !this.overdue;
      this.applyFilters();
    },

    hasFilters() {
      return this.search || this.project || this.priority || this.sort !== 'priority' || this.overdue;
    },

    clearFilters() {
      this.search = '';
      this.project = '';
      this.priority = '';
      this.sort = 'priority';
      this.overdue = false;
      this.applyFilters();
    }
  };
}
</script>
