<div class="task-item {{ task.priority }} {{ task.urgency_class }}" id="task-{{ task.id }}">
  <div class="task-info">
    <div class="task-name">{{ task.name }}</div>
    <div class="task-meta">
      {% if task.project %}
        <span class="task-project">{{ task.project }}</span>
      {% endif %}
      {% if task.checklist_total > 0 %}
        <span class="checklist-badge">
          <span class="checklist-bar">
            <span class="checklist-fill" style="width:{{ (task.checklist_done / task.checklist_total * 100)|int }}%"></span>
          </span>
          {{ task.checklist_done }}/{{ task.checklist_total }}
        </span>
      {% endif %}
      {% if task.days_badge %}
        {{ task.days_badge | safe }}
      {% endif %}
      <span style="color:var(--text-muted);font-size:0.75rem;">
        Criada {{ task.created_fmt }}
      </span>
    </div>
  </div>
  <div class="task-actions">
    <!-- Toggle Prioridade -->
    <div class="priority-picker" x-data="{ open: false }">
      <button class="btn-priority-toggle {{ task.priority }}" @click="open = !open" @click.outside="open = false" type="button">
        <span class="priority-dot"></span>
      </button>
      <div class="priority-dropdown" x-show="open" x-transition style="display:none;">
        <button class="priority-option normal {% if task.priority == 'normal' %}active{% endif %}"
                hx-post="/tasks/{{ task.id }}/set-priority?priority=normal"
                hx-target="#panel-ativas" hx-swap="innerHTML"
                hx-on::before-request="open = false; this.closest('.task-item').style.opacity = '0.4'; this.closest('.task-item').style.filter = 'drop-shadow(0 0 4px var(--accent))';">
          <span class="pri-dot" style="background:#94a3b8;"></span> Normal
        </button>
        <button class="priority-option urgente {% if task.priority == 'urgente' %}active{% endif %}"
                hx-post="/tasks/{{ task.id }}/set-priority?priority=urgente"
                hx-target="#panel-ativas" hx-swap="innerHTML"
                hx-on::before-request="open = false; this.closest('.task-item').style.opacity = '0.4'; this.closest('.task-item').style.filter = 'drop-shadow(0 0 4px var(--accent))';">
          <span class="pri-dot" style="background:#f4a261;"></span> Urgente
        </button>
        <button class="priority-option critica {% if task.priority == 'critica' %}active{% endif %}"
                hx-post="/tasks/{{ task.id }}/set-priority?priority=critica"
                hx-target="#panel-ativas" hx-swap="innerHTML"
                hx-on::before-request="open = false; this.closest('.task-item').style.opacity = '0.4'; this.closest('.task-item').style.filter = 'drop-shadow(0 0 4px var(--accent))';">
          <span class="pri-dot" style="background:#e63946;"></span> Crítica
        </button>
      </div>
    </div>
    <!-- Updates -->
    <button class="btn-updates"
            hx-get="/tasks/{{ task.id }}/updates"
            hx-target="#modal-container"
            hx-swap="innerHTML"
            hx-disabled-elt="this"
            title="Atualizações">
      💬
      {% if task.update_count > 0 %}
        <span class="update-count">{{ task.update_count }}</span>
      {% endif %}
    </button>
    <!-- Editar -->
    <button class="btn-edit"
            hx-get="/tasks/{{ task.id }}/edit-form"
            hx-target="#modal-container"
            hx-swap="innerHTML"
            hx-disabled-elt="this"
            title="Editar">✏️</button>
    <!-- Concluir -->
    <button class="btn-complete"
            hx-get="/tasks/{{ task.id }}/complete-form"
            hx-target="#modal-container"
            hx-swap="innerHTML"
            hx-disabled-elt="this"
            title="Concluir">✓</button>
    <!-- Descartar -->
    <button class="btn-discard"
            hx-post="/tasks/{{ task.id }}/discard"
            hx-target="#task-{{ task.id }}"
            hx-swap="outerHTML"
            hx-confirm="Descartar esta tarefa?"
            hx-disabled-elt="this"
            title="Descartar">🗑</button>
  </div>
</div>
