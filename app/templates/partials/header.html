<header>
  <div>
    <div class="header-brand">
      <h1>Jtasks</h1>
      <span class="header-version">v02</span>
    </div>
    <div class="date" id="header-date"></div>
  </div>

  <div style="display:flex;align-items:center;gap:10px;">
    <span id="header-email">{{ user.email }}</span>

    <button id="btn-theme"
            onclick="(function(){
              var dark = document.documentElement.getAttribute('data-theme')==='dark';
              document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
              localStorage.setItem('jtasks-theme', dark ? 'light' : 'dark');
              this.textContent = dark ? '🌙' : '☀️';
              if (document.querySelector('.tab-btn.active[data-tab=performance]')) {
                htmx.trigger('#perf-data-trigger', 'perf-reload');
              }
            }).call(this)"
            style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:1rem;transition:background 0.2s;"
            title="Alternar tema">🌙</button>

    <button id="btn-presets"
            hx-get="/presets"
            hx-target="#modal-container"
            hx-swap="innerHTML">
      <span>📋</span> <span class="btn-label">Presets</span>
    </button>

    <form action="/auth/logout" method="post" style="display:inline;">
      <button id="btn-logout" type="submit">🚪</button>
    </form>
  </div>
</header>

<script>
  (function() {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.getElementById('btn-theme').textContent = dark ? '☀️' : '🌙';
    var MESES = ["janeiro","fevereiro","março","abril","maio","junho",
                 "julho","agosto","setembro","outubro","novembro","dezembro"];
    var DIAS  = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira",
                 "Quinta-feira","Sexta-feira","Sábado"];
    var d = new Date();
    document.getElementById('header-date').textContent =
      DIAS[d.getDay()] + ', ' + d.getDate() + ' de ' + MESES[d.getMonth()] + ' de ' + d.getFullYear();
  })();
</script>
