<aside class="sidebar" id="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">J</div>
    <span class="sidebar-logo-text">Jtasks</span>
    <span class="sidebar-logo-version">v03 - Beta Edition</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <button class="nav-item active" data-tab="ativas"
            onclick="switchTab('ativas', this)"
            hx-get="/tasks"
            hx-target="#panel-ativas"
            hx-trigger="click once"
            hx-swap="innerHTML"
            >
      <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
      <span class="nav-item-label">Tasks Ativas</span>
    </button>

    <button class="nav-item" data-tab="concluidas"
            onclick="switchTab('concluidas', this)"
            hx-get="/tasks/completed"
            hx-target="#panel-concluidas"
            hx-trigger="click once"
            hx-swap="innerHTML">
      <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
      <span class="nav-item-label">Concluídas</span>
    </button>

    <button class="nav-item" data-tab="projetos"
            onclick="switchTab('projetos', this)"
            hx-get="/projects"
            hx-target="#panel-projetos"
            hx-trigger="click once"
            hx-swap="innerHTML">
      <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>
      <span class="nav-item-label">Projetos</span>
    </button>

    <button class="nav-item" data-tab="calendario"
            onclick="switchTab('calendario', this)"
            hx-get="/tasks/calendar"
            hx-target="#panel-calendario"
            hx-trigger="click once"
            hx-swap="innerHTML">
      <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
      <span class="nav-item-label">Calendario</span>
    </button>

    <button class="nav-item" data-tab="performance"
            onclick="switchTab('performance', this)">
      <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      <span class="nav-item-label">Performance</span>
    </button>

    <button class="nav-item" data-tab="ideias"
            onclick="switchTab('ideias', this)"
            hx-get="/ideas"
            hx-target="#panel-ideias"
            hx-trigger="click once"
            hx-swap="innerHTML">
      <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg></span>
      <span class="nav-item-label">Ideias</span>
    </button>

    <button class="nav-item"
            onclick="startGuidedTour()">
      <span class="nav-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
      <span class="nav-item-label">Guia</span>
    </button>
  </nav>
</aside>

<!-- Top Bar -->
<div class="topbar" id="topbar">
  <div class="topbar-left" id="topbar-date"></div>
  <div class="topbar-right" x-data="{ dropdownOpen: false }">
    <button class="topbar-user" @click="dropdownOpen = !dropdownOpen" @click.outside="dropdownOpen = false">
      <div class="user-avatar">{{ user.email[0] | upper }}</div>
      <span class="user-email-text">{{ user.email }}</span>
      <svg class="chevron" :class="{'rotate': dropdownOpen}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    
    <div x-show="dropdownOpen"
         x-transition:enter="transition ease-out duration-100"
         x-transition:enter-start="opacity-0 transform scale-95"
         x-transition:enter-end="opacity-100 transform scale-100"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="opacity-100 transform scale-100"
         x-transition:leave-end="opacity-0 transform scale-95"
         class="topbar-dropdown"
         style="display: none;">
      
      <div class="dropdown-header">
        <div class="dropdown-title">Minha Conta</div>
        <div class="dropdown-email">{{ user.email }}</div>
      </div>
      <div class="dropdown-divider"></div>

      <button class="dropdown-item" data-tab="notificacoes"
              @click="dropdownOpen = false"
              onclick="switchTab('notificacoes', this)"
              hx-get="/notify/config"
              hx-target="#panel-notificacoes"
              hx-trigger="click once"
              hx-swap="innerHTML">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        Configurações
      </button>

      <button class="dropdown-item" id="btn-theme"
              onclick="(function(){
                var dark = document.documentElement.getAttribute('data-theme')==='dark';
                document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
                localStorage.setItem('jtasks-theme', dark ? 'light' : 'dark');
                updateThemeIcon();
                if (document.querySelector('.nav-item.active[data-tab=performance]')) {
                  loadPerformance();
                }
              }).call(this)">
        <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></svg>
        Alternar Tema
      </button>

      <form action="/auth/logout" method="post" class="dropdown-form"
            onsubmit="this.querySelector('button').disabled=true; document.getElementById('global-progress').classList.add('active');">
        <button type="submit" class="dropdown-item danger">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair do Jtasks
        </button>
      </form>
    </div>
  </div>
</div>

<script>
function updateThemeIcon() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  var moon = document.getElementById('theme-icon-moon');
  var sun = document.getElementById('theme-icon-sun');
  if (moon && sun) {
    moon.style.display = dark ? 'none' : 'block';
    sun.style.display = dark ? 'block' : 'none';
  }
}

(function() {
  updateThemeIcon();

  // Date
  var MESES = ["janeiro","fevereiro","março","abril","maio","junho",
               "julho","agosto","setembro","outubro","novembro","dezembro"];
  var MESES_ABR = ["jan","fev","mar","abr","mai","jun",
                   "jul","ago","set","out","nov","dez"];
  var DIAS  = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira",
               "Quinta-feira","Sexta-feira","Sábado"];
  var DIAS_ABR = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  var d = new Date();
  // ISO week number
  function getWeekNumber(dt) {
    var tmp = new Date(dt.getTime());
    tmp.setHours(0,0,0,0);
    tmp.setDate(tmp.getDate() + 3 - (tmp.getDay() + 6) % 7);
    var week1 = new Date(tmp.getFullYear(), 0, 4);
    return 1 + Math.round(((tmp.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  }
  var el = document.getElementById('topbar-date');
  if (el) {
    var isMobile = window.innerWidth <= 1024;
    if (isMobile) {
      el.textContent = DIAS_ABR[d.getDay()] + ', ' + d.getDate() + ' ' + MESES_ABR[d.getMonth()] + ' ' + d.getFullYear() + ' | Sem ' + getWeekNumber(d);
    } else {
      el.textContent = DIAS[d.getDay()] + ', ' + d.getDate() + ' de ' + MESES[d.getMonth()] + ' de ' + d.getFullYear() + '  |  Semana ' + getWeekNumber(d);
    }
  }
})();

function switchTab(name, btn) {
  document.querySelectorAll('.nav-item[data-tab]').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  var panel = document.getElementById('panel-' + name);
  panel.classList.add('active');
  if (name === 'performance') { loadPerformance(); }
  // Loading feedback: show pulse loader in panel if empty
  if (!panel.innerHTML.trim() || panel.innerHTML.indexOf('Carregando') > -1 || panel.innerHTML.indexOf('pulse-loader') > -1) {
    panel.innerHTML = '<div class="pulse-loader"><div class="pulse-circle"></div><span class="pulse-text">Carregando...</span></div>';
  }
}

function startGuidedTour() {
  if (!window.driver || !window.driver.js || !window.driver.js.driver) {
    console.error("Driver.js not loaded");
    return;
  }
  const driverObj = window.driver.js.driver;
  const tour = driverObj({
    showProgress: true,
    animate: true,
    nextBtnText: 'Próximo',
    prevBtnText: 'Anterior',
    doneBtnText: 'Concluir',
    steps: [
      {
        element: document.querySelector('.nav-item[data-tab="projetos"]'),
        popover: {
          title: 'Crie um Projeto',
          description: 'Comece criando um projeto para organizar suas tarefas por contexto (Ex: Pessoal, Trabalho).',
          side: "right", align: 'start'
        }
      },
      {
        element: document.querySelector('.nav-item[data-tab="ativas"]'),
        popover: {
          title: 'Adicione Tarefas',
          description: 'Na tela de Tasks Ativas você pode adicionar novas atividades vinculando-as aos seus projetos.',
          side: "right", align: 'start'
        }
      },
      {
        element: document.querySelector('.nav-item[data-tab="concluidas"]'),
        popover: {
          title: 'Histórico',
          description: 'Tudo o que você conclui fica guardado neste painel para histórico.',
          side: "right", align: 'start'
        }
      },
      {
        element: document.querySelector('.nav-item[data-tab="performance"]'),
        popover: {
          title: 'Performance',
          description: 'Acompanhe a sua produtividade diária e semanal com nossos gráficos.',
          side: "right", align: 'start'
        }
      },
      {
        element: document.querySelector('.topbar-user'),
        popover: {
          title: 'Seu Perfil',
          description: 'Acesse suas opções de conta, alterne o seu tema visual e encerre a sessão pelo seu perfil.',
          side: "bottom", align: 'end'
        }
      }
    ]
  });
  tour.drive();
}
</script>
