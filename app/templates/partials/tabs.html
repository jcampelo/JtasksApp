<div class="tabs" id="tabs-bar">
  <button class="tab-btn active" data-tab="ativas"
          onclick="switchTab('ativas', this)"
          hx-get="/tasks"
          hx-target="#panel-ativas"
          hx-trigger="click once"
          hx-swap="innerHTML">
    📋 Ativas
  </button>
  <button class="tab-btn" data-tab="concluidas"
          onclick="switchTab('concluidas', this)"
          hx-get="/tasks/completed"
          hx-target="#panel-concluidas"
          hx-trigger="click once"
          hx-swap="innerHTML">
    ✅ Concluídas
  </button>
  <button class="tab-btn" data-tab="projetos"
          onclick="switchTab('projetos', this)"
          hx-get="/projects"
          hx-target="#panel-projetos"
          hx-trigger="click once"
          hx-swap="innerHTML">
    📁 Projetos
  </button>
  <button class="tab-btn" data-tab="performance"
          onclick="switchTab('performance', this)">
    📊 Performance
  </button>
  <button class="tab-btn" data-tab="notificacoes"
          onclick="switchTab('notificacoes', this)"
          hx-get="/notify/config"
          hx-target="#panel-notificacoes"
          hx-trigger="click once"
          hx-swap="innerHTML">
    📧 Notificações
  </button>
</div>

<script>
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');

  if (name === 'performance') {
    loadPerformance();
  }
}
</script>
