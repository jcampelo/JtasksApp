<div class="modal-backdrop show" id="modal-backdrop"
     onclick="if(event.target===this)document.getElementById('modal-container').innerHTML=''">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 Presets / Recorrentes</h2>
      <button class="btn-close" onclick="document.getElementById('modal-container').innerHTML=''">×</button>
    </div>

    <div class="preset-list" id="presets-list">
      {% if presets %}
        {% for p in presets %}
        <div class="preset-item" id="preset-{{ p.id }}">
          <div class="preset-info">
            <div class="preset-name">{{ p.name }}</div>
            <div class="preset-sub">
              {% if p.project %}{{ p.project }} · {% endif %}{{ p.priority | capitalize }}
            </div>
          </div>
          <button class="btn-remove"
                  hx-delete="/presets/{{ p.id }}"
                  hx-target="#preset-{{ p.id }}"
                  hx-swap="outerHTML"
                  hx-disabled-elt="this">Remover</button>
        </div>
        {% endfor %}
      {% else %}
        <div class="modal-empty">Nenhum preset cadastrado.</div>
      {% endif %}
    </div>

    <button class="btn-apply-presets"
            hx-post="/presets/apply"
            hx-target="#panel-ativas"
            hx-swap="innerHTML"
            hx-disabled-elt="this"
            hx-on::before-request="this.textContent='Aplicando...'"
            hx-on::after-request="this.textContent='Aplicar todos hoje'; document.getElementById('modal-container').innerHTML=''">
      ▶ Aplicar todos hoje
    </button>

    <hr class="modal-divider" style="margin-top:16px;" />
    <h3>Novo preset</h3>
    <form class="modal-form"
          hx-post="/presets"
          hx-target="#presets-list"
          hx-swap="outerHTML"
          hx-disabled-elt="find .btn-add-preset"
          hx-on::before-request="this.querySelector('.btn-add-preset').textContent='Adicionando...'"
          hx-on::after-request="this.querySelector('.btn-add-preset').textContent='+ Adicionar preset'; if(event.detail.successful) this.reset()">
      <div class="field">
        <label>Nome</label>
        <input name="name" type="text" maxlength="120" required placeholder="Ex: Daily standup" />
      </div>
      <div class="field">
        <label>Projeto</label>
        <select name="project">
          <option value="">— Sem projeto —</option>
          {% for proj in projects %}
          <option value="{{ proj.name }}">{{ proj.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Prioridade</label>
        <select name="priority">
          <option value="normal">⚪ Normal</option>
          <option value="urgente">🟡 Urgente</option>
          <option value="critica">🔴 Crítica</option>
        </select>
      </div>
      <button type="submit" class="btn-add-preset">+ Adicionar preset</button>
    </form>
  </div>
</div>
