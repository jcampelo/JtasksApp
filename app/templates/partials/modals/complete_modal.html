<div class="modal-backdrop show" id="modal-backdrop"
     onclick="if(event.target===this)document.getElementById('modal-container').innerHTML=''">
  <div class="modal">
    <div class="modal-header">
      <h2>✅ Concluir Tarefa</h2>
      <button class="btn-close" onclick="document.getElementById('modal-container').innerHTML=''">×</button>
    </div>
    <p class="modal-task-subtitle">{{ task.name }}</p>
    <form hx-post="/tasks/{{ task.id }}/complete"
          hx-target="#modal-container"
          hx-swap="innerHTML"
          hx-disabled-elt="find .modal-confirm-btn"
          hx-on::before-request="this.querySelector('.modal-confirm-btn').textContent='Concluindo...'"
          hx-on::after-request="this.querySelector('.modal-confirm-btn').textContent='Confirmar conclusao'">
      <label class="modal-field-label">Data de conclusão</label>
      <input class="modal-date-input" type="date" name="completed_date"
             value="{{ today }}" max="{{ today }}" required />
      {% if error %}<span class="modal-err">{{ error }}</span>{% else %}<span class="modal-err"></span>{% endif %}
      <button type="submit" class="modal-confirm-btn">Confirmar conclusão</button>
    </form>
  </div>
</div>
<script>
  document.body.addEventListener('refreshTasks', function() {
    htmx.ajax('GET', '/tasks', {target: '#panel-ativas', swap: 'innerHTML'});
  });
</script>
