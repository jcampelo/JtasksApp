<div class="modal-backdrop show" id="modal-backdrop"
     onclick="if(event.target===this)document.getElementById('modal-container').innerHTML=''">
  <div class="modal">
    <div class="modal-header">
      <h2>✏️ Editar Tarefa</h2>
      <button class="btn-close" onclick="document.getElementById('modal-container').innerHTML=''">×</button>
    </div>
    <form class="modal-form"
          hx-post="/tasks/{{ task.id }}/edit"
          hx-target="#modal-container"
          hx-swap="innerHTML"
          hx-disabled-elt="find .modal-confirm-btn"
          hx-on::before-request="this.querySelector('.modal-confirm-btn').textContent='Salvando...'"
          hx-on::after-request="this.querySelector('.modal-confirm-btn').textContent='Salvar alteracoes'">
      <div class="field">
        <label>Atividade</label>
        <textarea name="name" maxlength="120" required>{{ task.name }}</textarea>
      </div>
      <div class="field">
        <label>Projeto</label>
        <select name="project" required>
          <option value="" disabled>— Selecione —</option>
          {% for proj in projects %}
          <option value="{{ proj.name }}" {% if task.project == proj.name %}selected{% endif %}>{{ proj.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Prioridade</label>
        <select name="priority">
          <option value="normal" {% if task.priority == 'normal' %}selected{% endif %}>⚪ Normal</option>
          <option value="urgente" {% if task.priority == 'urgente' %}selected{% endif %}>🟡 Urgente</option>
          <option value="critica" {% if task.priority == 'critica' %}selected{% endif %}>🔴 Crítica</option>
        </select>
      </div>
      <div class="field">
        <label>Prazo</label>
        <input type="date" name="deadline" value="{{ task.deadline or '' }}" />
      </div>
      {% if error %}<div class="modal-err">{{ error }}</div>{% endif %}
      <button type="submit" class="modal-confirm-btn">Salvar alterações</button>
    </form>

    <!-- Checklist -->
    <div class="modal-checklist-section">
      <h3 class="checklist-title">Checklist</h3>
      {% set task_id = task.id %}
      {% include "partials/checklist/checklist_list.html" with context %}
      <form class="checklist-add-form"
            hx-post="/tasks/{{ task.id }}/checklist"
            hx-target="#checklist-{{ task.id }}"
            hx-swap="outerHTML"
            hx-disabled-elt="find button"
            hx-on::after-request="if(event.detail.successful) this.reset()">
        <input type="text" name="text" placeholder="Novo item..." maxlength="120" required class="checklist-input" />
        <button type="submit" class="checklist-add-btn">+</button>
      </form>
    </div>
  </div>
</div>
