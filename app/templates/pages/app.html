{% extends "base.html" %}

{% block title %}Jtasks{% endblock %}

{% block content %}
{% include "partials/sidebar.html" %}

<div class="app-wrapper">
  <main>
    <!-- Ativas -->
    <div id="panel-ativas" class="tab-panel active">
      <div id="panel-ativas-content">
        <div class="pulse-loader">
          <div class="pulse-circle"></div>
          <span class="pulse-text">Carregando tarefas...</span>
        </div>
      </div>
    </div>

    <!-- Concluídas -->
    <div id="panel-concluidas" class="tab-panel"></div>

    <!-- Calendario -->
    <div id="panel-calendario" class="tab-panel"></div>

    <!-- Projetos -->
    <div id="panel-projetos" class="tab-panel"></div>

    <!-- Performance -->
    <div id="panel-performance" class="tab-panel">
      {% include "partials/performance/performance_tab.html" %}
    </div>

    <!-- Notificações -->
    <div id="panel-notificacoes" class="tab-panel"></div>

    <!-- Ideias de Projetos -->
    <div id="panel-ideias" class="tab-panel"></div>

    <!-- Notas Livres -->
    <div id="panel-notas" class="tab-panel"></div>
  </main>
</div>

<!-- Modal container (carregado via HTMX) -->
<div id="modal-container"></div>

{% include "partials/toast.html" %}
{% endblock %}

{% block scripts %}
<script src="/static/js/charts.js"></script>
<script>
  // Carrega as tarefas ativas na inicialização
  document.addEventListener('DOMContentLoaded', function() {
    htmx.ajax('GET', '/tasks', {target: '#panel-ativas', swap: 'innerHTML'});
  });

  // Atualiza a lista de tarefas ativas em tempo real
  document.body.addEventListener('refreshTasks', function() {
    htmx.ajax('GET', '/tasks', {target: '#panel-ativas', swap: 'innerHTML'});
  });
</script>
{% endblock %}
