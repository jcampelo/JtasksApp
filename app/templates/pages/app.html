{% extends "base.html" %}

{% block title %}Jtasks{% endblock %}

{% block content %}
{% include "partials/sidebar.html" %}

<div class="app-wrapper">
  <main>
    <!-- Ativas -->
    <div id="panel-ativas" class="tab-panel active">
      <div id="panel-ativas-content">
        <div class="pulse-loader">
          <div class="pulse-circle"></div>
          <span class="pulse-text">Carregando tarefas...</span>
        </div>
      </div>
    </div>

    <!-- Concluídas -->
    <div id="panel-concluidas" class="tab-panel"></div>

    <!-- Calendario -->
    <div id="panel-calendario" class="tab-panel"></div>

    <!-- Projetos -->
    <div id="panel-projetos" class="tab-panel"></div>

    <!-- Performance -->
    <div id="panel-performance" class="tab-panel">
      {% include "partials/performance/performance_tab.html" %}
    </div>

    <!-- Notificações -->
    <div id="panel-notificacoes" class="tab-panel"></div>

    <!-- Ideias de Projetos -->
    <div id="panel-ideias" class="tab-panel"></div>

    <!-- Notas Livres -->
    <div id="panel-notas" class="tab-panel"></div>

    <!-- Admin -->
    <div id="panel-admin" class="tab-panel"></div>

    <!-- Acompanhamento (owner only) -->
    <div id="panel-monitoring" class="tab-panel"></div>
  </main>
</div>

<!-- Modal container (carregado via HTMX) -->
<div id="modal-container"></div>

{% include "partials/toast.html" %}
{% endblock %}

{% block scripts %}
<script src="/static/js/charts.js"></script>
<script>
  // Carrega as tarefas ativas na inicialização
  document.addEventListener('DOMContentLoaded', function() {
    htmx.ajax('GET', '/tasks', {target: '#panel-ativas', swap: 'innerHTML'});
  });

  // Verifica se o usuário está digitando em qualquer campo do painel ativo
  function _isUserTyping() {
    var activeEl = document.activeElement;
    if (!activeEl) return false;
    if (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.isContentEditable) return true;
    // Verifica se um modal está aberto
    var modal = document.getElementById('modal-container');
    if (modal && modal.innerHTML.trim()) return true;
    return false;
  }

  // Atualiza a lista de tarefas ativas em tempo real via eventos do frontend
  // Usa /tasks/filter para atualizar SOMENTE o corpo das tarefas, preservando o form
  document.body.addEventListener('refreshTasks', function() {
    var taskListBody = document.getElementById('task-list-body');
    if (taskListBody) {
      // O task-list-body já existe — atualiza somente as tarefas
      htmx.ajax('GET', '/tasks/filter', {target: '#task-list-body', swap: 'innerHTML'});
    } else {
      // Primeira carga — carrega o painel inteiro
      htmx.ajax('GET', '/tasks', {target: '#panel-ativas', swap: 'innerHTML'});
    }
  });

  // Auto-refresh inteligente (Polling) a cada 10 segundos
  setInterval(function() {
    // Evita atualizar se o usuário estiver digitando em qualquer campo
    if (_isUserTyping()) return;

    // Checa qual é a aba atual e requisita as atualizações do servidor HTMX
    var activeBtn = document.querySelector('.nav-item.active');
    if (!activeBtn) return;

    var tab = activeBtn.getAttribute('data-tab');
    
    // Para a aba de tarefas ativas, atualiza somente o corpo (sem tocar no form)
    if (tab === 'ativas') {
      var taskListBody = document.getElementById('task-list-body');
      if (taskListBody) {
        htmx.ajax('GET', '/tasks/filter', {target: '#task-list-body', swap: 'innerHTML'});
      }
      return;
    }

    // Mapa das rotas por painel para as demais abas
    var routes = {
      // 'notas' removido do polling: o estado minimizado vive no localStorage
      // e seria perdido a cada re-render. Notas só mudam quando o próprio usuário
      // interage, então polling não agrega valor aqui.
      'ideias': { url: '/ideas', target: '#panel-ideias' },
      'concluidas': { url: '/tasks/completed', target: '#panel-concluidas' },
      'calendario': { url: '/tasks/calendar', target: '#panel-calendario' },
      'projetos': { url: '/projects', target: '#panel-projetos' }
    };
    
    // Atualiza o painel ativo sem recarregar a página inteira
    if (routes[tab]) {
      htmx.ajax('GET', routes[tab].url, {target: routes[tab].target, swap: 'innerHTML'});
    }
  }, 10000);
</script>
{% endblock %}
